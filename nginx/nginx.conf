user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Upload limit — keep generous for whiteboard image pastes / attachments.
    # Matches the backend MAX_FILE_BYTES (100M) and Cloudflare's free-plan
    # request-body cap.
    client_max_body_size 100M;

    # ---- Real client IP (behind Cloudflare Tunnel / a private proxy) ----
    # Cloudflare Tunnel's cloudflared connects to nginx from the private
    # docker network and carries the true visitor IP in CF-Connecting-IP.
    # We resolve it back to $remote_addr so both the edge rate limits below
    # AND the X-Real-IP we forward to the backend reflect the real client —
    # not one shared tunnel IP. Trusted ONLY from private/loopback peers, so
    # a client hitting nginx directly on a public IP can't spoof the header.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ---- Edge rate / connection limits (DoS backstop) ------------------
    # A coarse per-client shield in front of the app-layer limiter, keyed on
    # the resolved real IP above. Generous enough for a SPA that bursts many
    # API calls on load (burst=60 nodelay), brutal to a flood. The app's own
    # per-route + per-user limiters still stack on top.
    limit_req_zone  $binary_remote_addr zone=api_rl:10m   rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;
    limit_req_status  429;
    limit_conn_status 429;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- HSTS gating ---------------------------------------------------
    # Promptly sits behind a Cloudflare tunnel that terminates TLS and
    # reaches us over HTTP. Cloudflare sets X-Forwarded-Proto=https on
    # the request, so we only add Strict-Transport-Security when the
    # *original* request was HTTPS — issuing HSTS on a plain-HTTP
    # response is meaningless and could trip browser warnings on a
    # local dev box.
    map $http_x_forwarded_proto $hsts_header {
        default                 "";
        https                   "max-age=63072000; includeSubDomains; preload";
    }

    # ----- Upstreams -----
    upstream promptly_frontend {
        server frontend:80;
    }

    upstream promptly_backend {
        server backend:8000;
    }

    upstream promptly_collab {
        server collab:1234;
    }

    # WebSocket upgrade map — ``Connection`` must be "upgrade" only
    # when the incoming request is trying to upgrade to a websocket,
    # otherwise we break plain HTTP requests that happen to set a
    # ``Connection`` header for other reasons.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ===================================================================
    # DEPLOYMENT CONTRACT — TLS
    # ===================================================================
    # This stack does NOT terminate TLS by default; it serves plain HTTP on
    # :80 and expects to sit behind a TLS-terminating front. Two supported
    # models for a PUBLIC domain — pick one, do not expose :80 to the raw
    # internet:
    #
    #   (A) Cloudflare Tunnel / Caddy / Traefik in front (recommended).
    #       TLS terminates upstream; it reaches nginx over HTTP and sets
    #       X-Forwarded-Proto=https (which gates our HSTS header) and
    #       CF-Connecting-IP (resolved to the real client above). Firewall
    #       the host so ONLY the tunnel/proxy can reach the published
    #       NGINX_HTTP_PORT — never publish it to 0.0.0.0 on the internet.
    #
    #   (B) Terminate TLS here. Drop fullchain.pem + privkey.pem into
    #       ./nginx/ssl (already mounted read-only at /etc/nginx/ssl) and
    #       uncomment the :443 server block + the :80→:443 redirect below.
    #
    # Serving plain :80 straight to the internet sends credentials and
    # session cookies in cleartext — the boot wizard warns about this too.
    #
    # (B) — uncomment once certs are in ./nginx/ssl:
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name your-domain.example;
    #     return 301 https://$host$request_uri;   # force HTTPS
    # }
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     http2 on;
    #     server_name your-domain.example;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #     # ...then copy the add_header + location blocks from the server below.
    # }

    # ----- HTTP server -----
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ---- Security response headers ---------------------------------
        # ``always`` makes nginx send these on 4xx/5xx as well — the
        # default behaviour only attaches headers to 2xx/3xx responses,
        # which would leak an unprotected error page.
        #
        # NOTE: nginx ``add_header`` directives DO NOT inherit into
        # nested ``location`` blocks if the inner block defines its own
        # ``add_header``. Anything we add inside a location must repeat
        # the security headers we want preserved. Today no location adds
        # extra headers, so the server-level set is authoritative.
        add_header Strict-Transport-Security $hsts_header always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        # Disable browser features the app doesn't use, to shrink the
        # attack surface available to a hypothetical XSS. ``microphone=
        # (self)`` is allowed for the voice features (dictation + voice
        # mode); an empty ``microphone=()`` would block getUserMedia for
        # the app's own origin too, with no browser prompt. If we ever need
        # the camera (e.g. QR-code MFA enrollment) flip it to ``(self)`` the
        # same way.
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()" always;

        # ---- Content Security Policy -----------------------------------
        # Tight policy tailored for the SPA. Notes on each directive:
        #
        #   default-src 'self'   — fail-closed baseline for anything we
        #                          forget to enumerate.
        #   script-src 'self'    — Vite emits hashed bundles served from
        #                          /assets/. No third-party scripts are
        #                          loaded; the SW lives at /sw.js (same
        #                          origin).
        #   style-src includes 'unsafe-inline' because Tailwind + a few
        #     React components emit inline ``style=""`` attributes and
        #     CSS-in-JS (Excalidraw). 'unsafe-inline' for STYLES does
        #     not enable script execution, so the XSS impact is limited
        #     to visual hijacking.
        #   font-src + style-src list fonts.googleapis.com and
        #     fonts.gstatic.com because index.html preconnects DM Sans.
        #   img-src includes data: / blob: for chat attachment previews
        #     and PWA icon decoding.
        #   connect-src 'self' data: — the frontend XHRs same-origin
        #     (/api/...); external LLM/search calls happen server-side.
        #     ``data:`` is kept for the workspace canvas (Excalidraw):
        #     pasted / embedded images are carried as ``data:`` URLs, which
        #     Excalidraw round-trips through fetch in some paths. The
        #     editor's own fonts + locales are self-hosted same-origin
        #     (``/excalidraw-assets/``, pointed at by EXCALIDRAW_ASSET_PATH
        #     in main.tsx), so nothing loads off-origin — no third-party
        #     host is whitelisted for the canvas.
        #   frame-src 'self' blob: https://www.youtube-nocookie.com —
        #     Drive's FilePreviewModal streams PDFs through
        #     ``apiClient`` so they inherit the user's Authorization
        #     header, then points an ``<iframe>`` at the resulting
        #     ``blob:`` URL. Without ``blob:`` here the browser falls
        #     back to ``default-src`` and blocks the iframe ("This
        #     content is blocked"). Whiteboard exercises embed
        #     same-origin HTML served from
        #     ``/api/study/exercise-frame/`` — hence ``'self'``.
        #     YouTube nocookie is whitelisted so TipTap documents can
        #     embed the privacy-enhanced player (never the tracking
        #     youtube.com variant).
        #   img-src also lists i.ytimg.com so YouTube poster frames
        #     decode without breaking the iframe's first paint.
        #   frame-ancestors 'none' is the modern equivalent of
        #     X-Frame-Options DENY but covered for older browsers too.
        #   base-uri 'self' + form-action 'self' kill the most common
        #     CSP-bypass vectors.
        #   Clerk auth + Stripe billing were removed (self-hosted custom-auth
        #     build), so their former script/connect/frame allowances are
        #     gone — every extra whitelisted host is standing XSS-amplification
        #     surface. script-src is back to a strict 'self'. If you ever
        #     reintroduce a third-party auth/billing provider, add only its
        #     exact hosts here.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://i.ytimg.com; media-src 'self' blob:; connect-src 'self' data:; worker-src 'self' blob:; manifest-src 'self'; frame-src 'self' blob: https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

        # ---- Whiteboard exercise frame (sandboxed iframe content) ----
        # AI-authored exercise HTML is rendered inside a sandboxed
        # iframe. That iframe MUST be able to execute inline
        # ``<script>`` blocks (the AI generates them directly in the
        # page body to wire up drag-and-drop, quizzes, etc.) and MUST
        # be frameable by the SPA.
        #
        # The server-level CSP blocks both — ``script-src 'self'`` kills
        # inline execution, and ``frame-ancestors 'none'`` /
        # ``X-Frame-Options DENY`` stop the SPA from embedding it. We
        # therefore carve this one path out with a loosened policy.
        #
        # Safe because the iframe in the SPA carries
        # ``sandbox="allow-scripts"`` WITHOUT ``allow-same-origin``, so
        # the exercise runs on a null origin with no access to parent
        # cookies, storage, or the authenticated session. The
        # ``script-src`` below still only allows ``'self'`` for external
        # scripts (plus ``'unsafe-inline'`` for the model's inline
        # glue); external origins are still blocked.
        #
        # NOTE: declaring any ``add_header`` inside this location
        # discards the server-level ``add_header`` stack entirely. Every
        # security header we want to keep is repeated explicitly below.
        location /api/study/exercise-frame/ {
            proxy_pass         http://promptly_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_buffering          off;
            proxy_cache              off;
            proxy_read_timeout       24h;
            proxy_send_timeout       24h;
            chunked_transfer_encoding on;

            add_header Strict-Transport-Security $hsts_header always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()" always;
            add_header Cache-Control "no-store" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; frame-ancestors 'self'; base-uri 'self'; form-action 'none'; object-src 'none'" always;
        }

        # ---- Document collaboration websocket ----
        # Drive's TipTap editor terminates a Y.js sync websocket here.
        # The Hocuspocus server listens on :1234 inside the docker
        # network and the path it sees is the trailing document UUID
        # (e.g. /api/collab/<uuid>). Proxying as an upgrade so the
        # websocket handshake completes and subsequent frames flow.
        #
        # NOTE: declaring any ``add_header`` inside this location
        # discards the server-level ``add_header`` stack — repeat the
        # security headers we want preserved.
        location /api/collab/ {
            # Strip the ``/api/collab`` prefix before forwarding — the
            # Hocuspocus server sees the path as ``/<document-uuid>``
            # which is what it uses as the document name.
            rewrite ^/api/collab/(.*)$ /$1 break;
            proxy_pass         http://promptly_collab;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    1h;
            proxy_send_timeout    1h;

            add_header Strict-Transport-Security $hsts_header always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()" always;
        }

        # ---- API (HTTP + SSE) ----
        location /api/ {
            # Edge rate + concurrency limits (keyed on the resolved real IP).
            # burst=60 nodelay absorbs a page-load API burst; sustained
            # 30 r/s is plenty for a human. limit_conn caps a single client's
            # concurrent sockets (SSE + collab + tabs) without starving them.
            limit_req  zone=api_rl burst=60 nodelay;
            limit_conn api_conn 200;

            proxy_pass         http://promptly_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE / streaming — do not buffer, keep connection alive.
            proxy_buffering          off;
            proxy_cache              off;
            proxy_read_timeout       24h;
            proxy_send_timeout       24h;
            chunked_transfer_encoding on;

            # WebSocket upgrade support (used by FastAPI WebSockets).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---- Frontend (SPA) ----
        location / {
            proxy_pass         http://promptly_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Vite dev server HMR needs WebSocket.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
