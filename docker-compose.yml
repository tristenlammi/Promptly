# ============================================================
# Promptly — single-file production compose.
#
# This is the only file you need to bring the stack up:
#
#   docker compose up -d
#
# Works the same on Unraid (Compose Manager points at this
# file), a plain Linux server, or Docker Desktop. The defaults
# are tuned for "drop in and run" — ports stay out of the
# well-known cluster so they don't collide with the Unraid web
# UI, Portainer, the *arr stack, qBittorrent etc., and all
# stateful data lives in ./data/ alongside the compose file
# so backups and inspection are trivial.
#
# Override anything via .env (see .env.example). The most
# common ones are:
#   - NGINX_HTTP_PORT / NGINX_HTTPS_PORT (default 8087 / 8488)
#   - DOMAIN
#
# `docker-compose.dev.yml` exists separately for local
# development (Vite HMR, exposed Postgres). Don't load it on
# a production / Unraid host.
# ============================================================

# Compose project name — drives the prefix on auto-generated
# resources (volumes, default network) so they read e.g.
# "promptly_*" in `docker volume ls`.
name: Promptly

services:
  nginx:
    image: nginx:alpine
    container_name: Promptly-Nginx
    # Only nginx publishes ports to the host — everything else
    # (frontend, backend, Postgres, Redis, SearXNG) stays on the
    # internal "promptly" docker network and is reached through
    # this reverse proxy. That's simpler for the user (one URL:
    # http://<host>:8087 serves UI + API) and safer (your
    # database is never exposed on the LAN).
    ports:
      - "${NGINX_HTTP_PORT:-8087}:80"
      - "${NGINX_HTTPS_PORT:-8488}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - collab
    restart: unless-stopped
    healthcheck:
      # nginx:alpine ships wget. We hit a static path the SPA
      # serves to confirm both nginx and the upstream frontend
      # container are alive.
      test: ["CMD", "wget", "-qO-", "--tries=1", "--timeout=2", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - promptly

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Auth provider baked into the Vite build. Defaults to the built-in JWT
      # auth; set VITE_AUTH_PROVIDER=clerk + VITE_CLERK_PUBLISHABLE_KEY in the
      # environment (or .env) to build the Clerk variant.
      args:
        - VITE_AUTH_PROVIDER=${VITE_AUTH_PROVIDER:-custom}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:-}
    container_name: Promptly-Frontend
    environment:
      - VITE_API_BASE_URL=/api
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - promptly

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Promptly-Backend
    environment: &backend-env
      - DATABASE_URL=postgresql+asyncpg://promptly:${POSTGRES_PASSWORD}@postgres:5432/promptly
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - SINGLE_USER_MODE=${SINGLE_USER_MODE:-false}
      # Reversible Clerk auth. Defaults keep the built-in JWT auth; set
      # AUTH_PROVIDER=clerk + CLERK_ISSUER to verify Clerk session tokens.
      - AUTH_PROVIDER=${AUTH_PROVIDER:-custom}
      - CLERK_ISSUER=${CLERK_ISSUER:-}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL:-}
      - SEARXNG_URL=http://searxng:8080
      # CORS allow-list and provider/search API keys are now configured
      # through the first-run wizard and Admin → Settings — not via
      # ``.env``. The legacy ``ALLOWED_ORIGINS`` / provider env vars are
      # still honoured by ``app.config`` if set, but the install scripts
      # no longer seed them. See ``app.cors_dynamic`` for the resolution
      # order ("always-allowed localhost ∪ env ALLOWED_ORIGINS ∪ DB
      # public_origins").
      # Internal-only Ollama URL — the container is reachable on
      # the ``promptly`` network at the well-known port (host port
      # mapping uses 11435 to dodge any host-side Ollama install).
      # Used by the Custom Models RAG pipeline for local embeddings
      # and, in Phase 2, for chat completions against locally-pulled
      # models.
      - OLLAMA_URL=http://ollama:11434
      # Embedding model auto-pulled on Ollama first start. Small
      # (~270 MB), fast, 768-dim — plenty for knowledge-base RAG
      # without making first-run downloads painful.
      - OLLAMA_DEFAULT_EMBEDDING_MODEL=${OLLAMA_DEFAULT_EMBEDDING_MODEL:-nomic-embed-text}
      # Code-interpreter sandbox (Phase 4). The backend submits
      # model-written Python here over the internal-only ``sandbox-net``
      # network. The shared secret (reusing SECRET_KEY) gates job
      # submission as defense-in-depth on top of the network boundary.
      - CODE_SANDBOX_URL=http://sandbox:8000
      - CODE_SANDBOX_SECRET=${SECRET_KEY}
      # Speech-to-text worker (Voice Phase 1). Internal-only faster-whisper
      # service the backend POSTs dictation clips to. STT_BACKEND=local
      # uses it; set STT_BACKEND=openai (+ an OpenAI key) to route to the
      # cloud Whisper API instead.
      - WHISPER_URL=http://whisper:8000
      - STT_BACKEND=${STT_BACKEND:-local}
      # Text-to-speech worker (Voice Phase 2). Internal-only Kokoro service
      # the backend POSTs assistant text to for read-aloud + voice mode.
      - TTS_URL=http://tts:8000
      - TTS_VOICE=${TTS_VOICE:-af_heart}
    volumes:
      # Bind-mount user data into the project directory so it's
      # always next to the compose file — easy to back up, easy
      # to inspect, and survives container recreation.
      - ./data/uploads:/app/uploads
      - ./data/whiteboard:/app/whiteboard
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Soft dependency — the chat path still boots and degrades
      # gracefully (code_interpreter returns a friendly error) if the
      # sandbox is slow to come up.
      sandbox:
        condition: service_started
      # Ollama is a soft dependency — the backend boots even if
      # Ollama is still warming up its embedding model (the RAG
      # ingester will surface a friendly "indexing failed, retry"
      # state in the UI rather than crashing the whole chat path).
      # ``service_started`` is enough; we don't wait on a healthcheck
      # because the model pull can take a minute on a cold install.
      ollama:
        condition: service_started
      # Soft dependency — dictation degrades to a friendly "transcription
      # unavailable" error if Whisper is still loading its model, rather
      # than blocking the whole backend boot on the weight download.
      whisper:
        condition: service_started
      # Soft dependency — read-aloud / voice mode degrade gracefully if
      # TTS is still warming up its model.
      tts:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      # The /api/health endpoint pings Postgres, Redis, and
      # SearXNG and returns 503 if any of them is unreachable,
      # so this single probe also surfaces upstream-dependency
      # failures via `docker compose ps`. Long start_period
      # because Alembic migrations run on first boot.
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      # Backend straddles both networks: ``promptly`` for the app
      # services (Postgres, Redis, Ollama, SearXNG) + the internet,
      # and ``sandbox-net`` so it can reach the isolated code sandbox.
      - promptly
      - sandbox-net

  arq-worker:
    # Durable execution of scheduled-automation runs. Same image as the
    # backend, launched as an Arq worker (``arq …WorkerSettings``) instead of
    # the API — so an API redeploy never kills an in-flight run: the job waits
    # in Redis and this worker picks it up. Reuses the backend's environment
    # (DB, Redis, provider/search/ollama URLs) and data volumes (runs write
    # generated files just like the API path).
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Promptly-ArqWorker
    # Bypass the shared entrypoint (which runs Alembic migrations + singleton
    # provisioning) — the backend owns those. The worker just needs a migrated
    # DB, which is ready by the time any job is enqueued. Avoids two containers
    # racing to migrate on a fresh deploy.
    entrypoint: ["arq", "app.tasks.worker.WorkerSettings"]
    environment: *backend-env
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/whiteboard:/app/whiteboard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - promptly
      - sandbox-net

  collab:
    # Hocuspocus websocket collaboration server for Drive documents.
    # Terminates Y.js sync websockets on port 1234 (internal only —
    # nginx proxies /api/collab/* here) and persists document CRDT
    # state to the shared Postgres instance. Debounces a snapshot POST
    # back to the FastAPI backend so the file's HTML blob + FTS index
    # stays within ~3s of the live CRDT.
    build:
      context: ./collab
      dockerfile: Dockerfile
    container_name: Promptly-Collab
    environment:
      # SECRET_KEY is used for two things here:
      #   1. Verifying the short-lived collab JWT the backend hands
      #      the browser (HS256, shared secret).
      #   2. Authenticating the snapshot POST back to the backend
      #      (bearer token) so only this service can overwrite
      #      HTML/FTS content.
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://promptly:${POSTGRES_PASSWORD}@postgres:5432/promptly
      - BACKEND_INTERNAL_URL=http://backend:8000
      - SNAPSHOT_DEBOUNCE_MS=${COLLAB_SNAPSHOT_DEBOUNCE_MS:-3000}
    expose:
      - "1234"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - promptly

  postgres:
    # ``pgvector/pgvector:pg15`` is the official pgvector-on-Postgres
    # image, drop-in compatible with the previous ``postgres:15-alpine``
    # data files (same major version). The ``vector`` extension is
    # enabled by an Alembic migration on first boot — the image just
    # ships the shared library so ``CREATE EXTENSION vector`` succeeds.
    # Required by Custom Models' RAG knowledge base.
    image: pgvector/pgvector:pg15
    container_name: Promptly-Postgres
    environment:
      - POSTGRES_USER=promptly
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=promptly
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptly -d promptly"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - promptly

  redis:
    image: redis:7-alpine
    container_name: Promptly-Redis
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - promptly

  ollama:
    # Local LLM runtime. Phase 1 uses it strictly for embeddings
    # (so the Custom Models RAG knowledge base works offline, even
    # without an OpenAI key); Phase 2 unlocks chat completions
    # against any model the admin pulls via the Local Models tab.
    #
    # The host port is deliberately 11435 (default Ollama port +1)
    # so a host-side Ollama install — which a lot of devs run for
    # other tooling — can keep using 11434 without colliding. The
    # backend talks to it on the internal ``promptly`` network at
    # the unmapped 11434, which is unaffected.
    image: ollama/ollama:latest
    container_name: Promptly-Ollama
    # ``OLLAMA_HOST`` defaults to 127.0.0.1 inside the container,
    # which means the docker network can't reach the API. Bind to
    # all interfaces so the backend can hit it. ``OLLAMA_KEEP_ALIVE``
    # holds models in memory between requests — at the embed-only
    # scale of Phase 1 a long keep-alive is essentially free and
    # eliminates 1-2s warm-up on every PATCH that re-indexes.
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      # Model auto-pulled by ``entrypoint-bootstrap.sh`` on first
      # start. Mirrored from the backend env so a single env var
      # controls both sides.
      - OLLAMA_DEFAULT_EMBEDDING_MODEL=${OLLAMA_DEFAULT_EMBEDDING_MODEL:-nomic-embed-text}
      # Serve more than one request at a time. Without this Ollama
      # serialises requests to a model, so a bulk background re-index
      # monopolises the embedder and an interactive workspace chat —
      # which embeds its query here for RAG retrieval before calling
      # the (possibly cloud) chat model — queues behind it and appears
      # to hang. With 2+ lanes the tiny query embed runs alongside the
      # index batch and returns immediately.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
    ports:
      # Only this port is published; the backend reaches Ollama
      # over the internal docker network on the unmapped 11434.
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      # Bootstrap script auto-pulls the embedding model on first
      # start so the user gets working RAG out of the box without
      # `docker exec ollama ollama pull ...`. Kept tiny on purpose;
      # heavier chat models are pulled via the Local Models UI in
      # Phase 2, with a real progress bar.
      - ./scripts/ollama-bootstrap.sh:/usr/local/bin/ollama-bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/ollama-bootstrap.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - promptly

  # ------------------------------------------------------------
  # Optional GPU override for the Ollama runtime.
  #
  # Enabled with ``COMPOSE_PROFILES=gpu``:
  #
  #   COMPOSE_PROFILES=gpu docker compose up -d
  #
  # This brings up a second service definition (``ollama-gpu``)
  # that reserves the host's NVIDIA GPUs via the NVIDIA Container
  # Toolkit. It uses ``container_name`` + ``profiles`` so the
  # CPU-only ``ollama`` service above is skipped when the profile
  # is active; the backend still reaches it as ``ollama`` over the
  # internal network because both services share the same name
  # via a network alias.
  #
  # Requires:
  #   - NVIDIA driver on the host
  #   - NVIDIA Container Toolkit installed + configured
  #     (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
  #
  # Non-NVIDIA hardware (AMD ROCm, Apple Silicon) is currently
  # CPU-only via the default service; upstream Ollama's ROCm
  # support isn't stable enough to enable by default here.
  # ------------------------------------------------------------
  ollama-gpu:
    profiles: ["gpu"]
    image: ollama/ollama:latest
    container_name: Promptly-Ollama-GPU
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_DEFAULT_EMBEDDING_MODEL=${OLLAMA_DEFAULT_EMBEDDING_MODEL:-nomic-embed-text}
      # See the CPU service above — keep interactive query embeds from
      # queuing behind a bulk background re-index.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      - ./scripts/ollama-bootstrap.sh:/usr/local/bin/ollama-bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/ollama-bootstrap.sh"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      promptly:
        # Share an alias with the CPU service so the backend's
        # ``OLLAMA_URL=http://ollama:11434`` resolves to whichever
        # variant is up.
        aliases:
          - ollama

  searxng:
    # Pinned to a specific dated build so a `docker compose
    # pull` can't silently break web search. Bump the tag
    # deliberately when you want to upgrade.
    # Tag list: https://hub.docker.com/r/searxng/searxng/tags
    image: searxng/searxng:2026.4.17-e8299a4c3
    container_name: Promptly-SearXNG
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - INSTANCE_NAME=promptly-search
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - promptly
    # NOTE: On first run, SearXNG occasionally can't write
    # /etc/searxng/uwsgi.ini with `cap_drop: ALL`. If the
    # container loops on startup, temporarily comment out the
    # `cap_drop` block, run `docker compose up -d searxng`,
    # then restore the cap-drop and recreate.

  sandbox:
    # Code-interpreter execution worker (Phase 4). Runs model-written
    # Python in a throwaway, resource-limited scratch dir. Deliberately
    # locked down:
    #   * On the internal-only ``sandbox-net`` (no internet, and no
    #     access to Postgres / Redis / Ollama, which live on ``promptly``).
    #   * Read-only root filesystem; the ONLY writable path is an
    #     in-memory tmpfs scratch. Throwaway jobs are wiped immediately;
    #     per-conversation session dirs persist there across calls (build
    #     a file, read it next call) and are reaped by idle-TTL + a count
    #     cap. Cleared on restart. No host or user data volumes mounted.
    #   * All Linux capabilities dropped, no privilege escalation, PID
    #     and memory caps. The worker process itself runs as non-root.
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: Promptly-Sandbox
    environment:
      - SANDBOX_SECRET=${SECRET_KEY}
    read_only: true
    tmpfs:
      - /sandbox/run:size=512m,uid=10001,gid=10001,mode=0700
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - sandbox-net

  whisper:
    # Speech-to-text worker (Voice Phase 1). Wraps faster-whisper in a
    # tiny FastAPI service; the backend POSTs dictation clips to
    # http://whisper:8000/transcribe over the internal network. CPU/int8
    # by default so it runs on any homelab box — no GPU required.
    #
    # First start downloads the model weights (~140 MB for ``base``) into
    # ./data/whisper, so give it a generous start_period before the
    # healthcheck counts failures. Bump WHISPER_MODEL to small/medium/
    # large-v3 (and add a GPU) for higher accuracy.
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: Promptly-Whisper
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      # Persist downloaded model weights so the pull is a one-time cost.
      - ./data/whisper:/root/.cache
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      # Long start period: the model download + load on a cold install
      # can take a couple of minutes on a slow connection.
      start_period: 180s
    networks:
      - promptly

  tts:
    # Text-to-speech worker (Voice Phase 2). Wraps Kokoro-82M in a tiny
    # FastAPI service; the backend POSTs assistant text to
    # http://tts:8000/tts over the internal network and gets back a WAV.
    # CPU/onnxruntime by default — no GPU, no torch.
    #
    # First start downloads the model weights (~330 MB) into ./data/tts,
    # so give it a generous start_period before the healthcheck counts
    # failures.
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: Promptly-TTS
    environment:
      - TTS_VOICE=${TTS_VOICE:-af_heart}
      - TTS_LANG=${TTS_LANG:-en-us}
    volumes:
      # Persist downloaded model weights so the pull is a one-time cost.
      - ./data/tts:/root/.cache
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 240s
    networks:
      - promptly

networks:
  promptly:
    name: promptly
    driver: bridge
  # Internal-only network for the code sandbox. ``internal: true`` means
  # containers on it have NO route to the internet or to the host —
  # they can only talk to other members of this network. The backend
  # joins both ``promptly`` and ``sandbox-net``; the sandbox joins ONLY
  # this one, so executed code is fully air-gapped from everything
  # except the backend that submits the job.
  sandbox-net:
    name: promptly-sandbox
    driver: bridge
    internal: true
