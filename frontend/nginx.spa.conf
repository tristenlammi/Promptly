server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip is configured in the main nginx container; keep this server simple.

    # The service worker's scope is the directory it's served from. We
    # ship sw.js at the root and want it controlling the whole origin,
    # so make sure it's served fresh — never cache the SW itself, or
    # users get stuck on stale builds even after a deploy.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    # PWA manifest: nginx's stock mime.types doesn't know about
    # .webmanifest. Override the default_type just inside this
    # location so the inherited mappings (`.js`, `.css`, `.png`, …)
    # stay intact for every other request.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # SPA fallback — every unmatched route returns index.html so React Router
    # can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
