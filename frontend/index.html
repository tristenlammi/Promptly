<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Promptly — self-hosted AI chat with Study mode and web search." />
    <title>Promptly</title>

    <!-- PWA: Chrome/Android pulls everything else from manifest.webmanifest,
         which vite-plugin-pwa generates and links automatically via its
         injected <link rel="manifest"> tag at build time. -->
    <meta name="theme-color" content="#D97757" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1917" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/promptly-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />

    <!-- iOS-specific PWA meta. Safari ignores the web manifest for
         Add to Home Screen, so these tags are how we get a real
         standalone app shell, the right launch icon, and a status-bar
         that doesn't clash with the brand color. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Promptly" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
